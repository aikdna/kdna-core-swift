name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: macos-14
    env:
      KDNA_CONFORMANCE_COMMIT: 4ede2aa539b94edd45aac973a0b4937c734c544a
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Audit public surface
        run: python3 scripts/check_public_surface.py
      - name: Audit Runtime cutover and workflow pins
        run: |
          python3 scripts/check_runtime_cutover.py
          python3 scripts/test_runtime_cutover_hostile.py
      - name: Checkout fixed kdna conformance fixtures
        run: |
          cd ..
          git init kdna
          cd kdna
          git remote add origin https://github.com/aikdna/kdna.git
          git fetch --depth 1 origin "$KDNA_CONFORMANCE_COMMIT"
          git checkout --detach FETCH_HEAD
      - name: Build
        run: swift build --scratch-path /tmp/kdna-core-swift-ci-scratch -Xcc -fmodules-cache-path=/tmp/kdna-core-swift-ci-module-cache
      - name: Build iOS 16 generic library
        run: |
          xcodebuild \
            -scheme kdna-core-swift \
            -destination 'generic/platform=iOS' \
            -derivedDataPath /tmp/kdna-core-swift-ios-ci \
            -clonedSourcePackagesDirPath /tmp/kdna-core-swift-ios-packages \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Test
        env:
          KDNA_CONFORMANCE_ROOT: ${{ github.workspace }}/../kdna
        run: swift test --scratch-path /tmp/kdna-core-swift-ci-scratch -Xcc -fmodules-cache-path=/tmp/kdna-core-swift-ci-module-cache
