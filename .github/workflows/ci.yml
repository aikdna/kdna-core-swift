name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Clone kdna fixtures
        run: |
          cd ..
          git clone --depth 1 --branch main https://github.com/aikdna/kdna.git
      - name: Build
        run: swift build
      - name: Test
        run: swift test
